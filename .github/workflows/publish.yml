name: Download and publish IP databases

on:
  workflow_dispatch:
  schedule:
    - cron: "17 5 3 * *"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      IP2LOCATION_TOKEN: ${{ secrets.IP2LOCATION_TOKEN }}
      OUTPUT_DIR: dist
      DOWNLOAD_DIR: downloads
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: bash start.sh
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="ip-data-$(date -u +%F)"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/* --clobber
            gh release edit "$tag" --notes-file RELEASE_NOTES.md
          else
            gh release create "$tag" dist/* --title "$tag" --notes-file RELEASE_NOTES.md --latest=false
          fi
